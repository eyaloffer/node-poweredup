<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שליטה ברכבת Duplo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚂</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 24px;
  }
  h1 { font-size: 1.8rem; margin-top: 8px; }

  #connect-btn {
    padding: 13px 40px;
    font-size: 1.2rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: #0f3460;
    color: white;
    width: 100%;
    max-width: 560px;
    transition: background 0.2s;
  }
  #connect-btn.connected { background: #1a5e1a; }
  #connect-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #status-bar {
    background: #16213e;
    border-radius: 12px;
    padding: 12px 24px;
    text-align: center;
    width: 100%;
    max-width: 560px;
  }
  #train-status { font-size: 0.85rem; color: #aaa; }
  #train-status.ready { color: #4caf50; }
  #heard { font-size: 1.3rem; min-height: 1.8rem; margin: 6px 0; }
  #last-cmd { font-size: 0.85rem; color: #aaa; }

  #led-preview {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #333;
    border: 3px solid #555;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .top-row { display: flex; align-items: center; gap: 16px; width: 100%; max-width: 560px; }
  .top-row #status-bar { flex: 1; }

  .drive-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 560px;
  }
  .drive-pad .big-btn {
    font-size: 1.5rem;
    padding: 18px 0;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #0f3460;
    color: #eee;
    transition: background 0.1s, transform 0.1s;
    user-select: none;
  }
  .drive-pad .big-btn:active, .drive-pad .big-btn.active { background: #e94560; transform: scale(0.95); }
  .drive-pad .big-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-forward  { grid-column: 2; }
  #btn-backward { grid-column: 2; }
  #btn-stop     { grid-column: 1; background: #7b0f1e; }
  #btn-stop:active { background: #e94560; }
  #btn-horn     { grid-column: 3; background: #1a5276; }
  #btn-horn:active { background: #5dade2; }

  .color-section { width: 100%; max-width: 560px; }
  .color-section h2 { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .color-btn {
    border: none;
    border-radius: 10px;
    padding: 12px 6px;
    font-size: 1rem;
    cursor: pointer;
    color: #111;
    font-weight: bold;
    transition: transform 0.1s;
    user-select: none;
  }
  .color-btn:active { transform: scale(0.93); }
  .color-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .color-btn.light-text { color: #eee; }

  /* Walkie-talkie PTT button */
  .ptt-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 560px;
  }
  .ptt-label { font-size: 0.8rem; color: #777; letter-spacing: 0.05em; }
  #ptt-btn {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 5px solid #555;
    background: radial-gradient(circle at 38% 35%, #5a5a5a, #222);
    color: #eee;
    font-size: 2.2rem;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.6), inset 0 -3px 8px rgba(0,0,0,0.5);
    transition: transform 0.08s, box-shadow 0.08s, background 0.1s;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #ptt-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #ptt-btn.active {
    background: radial-gradient(circle at 38% 35%, #e94560, #7b0f1e);
    border-color: #e94560;
    transform: scale(0.93);
    box-shadow: 0 2px 8px rgba(233,69,96,0.7), inset 0 -2px 6px rgba(0,0,0,0.4);
  }

  .note {
    font-size: 0.75rem;
    color: #666;
    max-width: 560px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>🚂 שליטה ברכבת Duplo</h1>

<button id="connect-btn">🔵 התחבר לרכבת (Bluetooth)</button>

<div class="top-row">
  <div id="led-preview"></div>
  <div id="status-bar">
    <div id="train-status">לא מחובר</div>
    <div id="heard">—</div>
    <div id="last-cmd">&nbsp;</div>
  </div>
</div>

<!-- Drive pad -->
<div class="drive-pad">
  <button class="big-btn" id="btn-forward"  disabled data-action="forward">⬆️<br>קדימה</button>
  <button class="big-btn" id="btn-stop"     disabled data-action="stop">🛑<br>עצור</button>
  <button class="big-btn" id="btn-horn"     disabled data-action="horn">📯<br>צופר</button>
  <button class="big-btn" id="btn-backward" disabled data-action="backward">⬇️<br>אחורה</button>
</div>

<!-- Color buttons -->
<div class="color-section">
  <h2>צבע תאורה:</h2>
  <div class="color-grid" id="color-grid"></div>
</div>

<!-- Walkie-talkie PTT -->
<div class="ptt-wrap">
  <span class="ptt-label">לחץ ודבר — שחרר לשלוח</span>
  <button id="ptt-btn" disabled aria-label="Push to talk">📻</button>
  <span class="ptt-label" id="ptt-status">—</span>
</div>

<p class="note">דורש Chrome עם תמיכה ב-Web Bluetooth ו-Web Speech. יש לאשר גישה ל-Bluetooth ומיקרופון.</p>

<script>
// ── BLE / LPF2 ──────────────────────────────────────────────────────────────
const SERVICE_UUID = '00001623-1212-efde-1623-785feabcd123';
const CHAR_UUID    = '00001624-1212-efde-1623-785feabcd123';
const MOTOR_PORT   = 0x32;
const SPEAKER_PORT = 0x34;

function motorPacket(power) {
  const p = power < 0 ? (256 + power) : power;
  return new Uint8Array([0x08, 0x00, 0x81, MOTOR_PORT, 0x11, 0x51, 0x00, p]);
}
const hornPacket   = () => new Uint8Array([0x0b,0x00,0x81,SPEAKER_PORT,0x11,0x51,0x01,0x07,0x01,0x00,0x00]);
const ledPacket    = c => new Uint8Array([0x0b,0x00,0x81,SPEAKER_PORT,0x11,0x51,0x01,0x04,0x01,c,0x00]);
const SUBSCRIBE_PKT = new Uint8Array([0x0a,0x00,0x41,SPEAKER_PORT,0x01,0x01,0x00,0x00,0x00,0x01]);

let characteristic = null;
let trainReady = false;

async function send(packet) {
  if (!characteristic) return;
  try { await characteristic.writeValueWithoutResponse(packet); }
  catch (e) { console.error('Send error:', e); }
}

// ── Walkie-talkie click sounds ───────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClick(type) {
  // type: 'on' = squelch open (rising), 'off' = squelch close (falling)
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'on') {
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.linearRampToValueAtTime(1200, now + 0.04);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.07);
    osc.start(now);
    osc.stop(now + 0.07);
  } else {
    osc.frequency.setValueAtTime(1200, now);
    osc.frequency.linearRampToValueAtTime(400, now + 0.05);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.08);
    osc.start(now);
    osc.stop(now + 0.08);
  }
}

// ── Colors & commands ────────────────────────────────────────────────────────
const LED_COLORS = [
  { word: 'ירוק',  value: 0x07, css: '#43a047', label: '🟢 ירוק' },
  { word: 'צהוב',  value: 0x08, css: '#fdd835', label: '🟡 צהוב' },
  { word: 'כחול',  value: 0x0f, css: '#1565c0', label: '🔵 כחול',  light: true },
  { word: 'סגול',  value: 0x0a, css: '#8e24aa', label: '🟣 סגול',  light: true },
  { word: 'אדום',  value: 0x0c, css: '#e53935', label: '🔴 אדום',  light: true },
  { word: 'לבן',   value: 0x01, css: '#e0e0e0', label: '⚪ לבן' },
  { word: 'תכלת',  value: 0x09, css: '#29b6f6', label: '🩵 תכלת' },
  { word: 'כבה',   value: 0x00, css: '#444',    label: '⬛ כבה',   light: true },
];

const VOICE_COMMANDS = [
  { words: ['קדימה'],         action: 'forward',  label: '⬆️ קדימה' },
  { words: ['אחורה'],         action: 'backward', label: '⬇️ אחורה' },
  { words: ['עצור', 'סטופ'],  action: 'stop',     label: '🛑 עצור' },
  { words: ['צופר', 'צפר'],   action: 'horn',     label: '📯 צופר' },
  ...LED_COLORS.map(c => ({ words: [c.word], action: 'led', value: c.value, label: `💡 ${c.word}` })),
];

// ── Build color buttons ──────────────────────────────────────────────────────
const colorGrid = document.getElementById('color-grid');
LED_COLORS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'color-btn' + (c.light ? ' light-text' : '');
  btn.style.background = c.css;
  btn.textContent = c.label;
  btn.disabled = true;
  btn.dataset.action = 'led';
  btn.dataset.value  = c.value;
  btn.addEventListener('click', () => {
    document.getElementById('led-preview').style.background = c.css;
    handleCommand({ action: 'led', value: c.value, label: `💡 ${c.word}` });
  });
  colorGrid.appendChild(btn);
});

// ── Connect ──────────────────────────────────────────────────────────────────
document.getElementById('connect-btn').addEventListener('click', async () => {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }],
    });
    document.getElementById('train-status').textContent = 'מתחבר...';
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_UUID);
    await send(SUBSCRIBE_PKT);
    setReady();
    const btn = document.getElementById('connect-btn');
    btn.textContent = '✅ מחובר';
    btn.classList.add('connected');
    btn.disabled = true;

    device.addEventListener('gattserverdisconnected', () => {
      characteristic = null; trainReady = false;
      document.getElementById('train-status').textContent = 'התנתק';
      document.getElementById('train-status').className = '';
      const b = document.getElementById('connect-btn');
      b.textContent = '🔵 התחבר לרכבת (Bluetooth)';
      b.classList.remove('connected');
      b.disabled = false;
      document.querySelectorAll('button[data-action]').forEach(x => x.disabled = true);
      document.querySelectorAll('.color-btn').forEach(x => x.disabled = true);
      document.getElementById('ptt-btn').disabled = true;
    });
  } catch (e) {
    document.getElementById('train-status').textContent = `שגיאה: ${e.message}`;
  }
});

function setReady() {
  trainReady = true;
  document.getElementById('train-status').textContent = '✅ רכבת מחוברת';
  document.getElementById('train-status').className = 'ready';
  document.querySelectorAll('button[data-action]').forEach(b => b.disabled = false);
  document.querySelectorAll('.color-btn').forEach(b => b.disabled = false);
  document.getElementById('ptt-btn').disabled = false;
}

// ── Handle command ───────────────────────────────────────────────────────────
function handleCommand({ action, value, label }) {
  if (!trainReady) return;
  document.getElementById('last-cmd').textContent = label || action;
  switch (action) {
    case 'forward':  send(motorPacket(80));  break;
    case 'backward': send(motorPacket(-80)); break;
    case 'stop':     send(motorPacket(127)); break;
    case 'horn':     send(hornPacket());     break;
    case 'led':
      const c = LED_COLORS.find(x => x.value === value);
      if (c) document.getElementById('led-preview').style.background = c.css;
      send(ledPacket(value));
      break;
  }
}

// ── Drive buttons ────────────────────────────────────────────────────────────
document.querySelectorAll('.big-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    handleCommand({ action: btn.dataset.action, label: btn.textContent.replace('\n','') });
  });
});

// ── PTT / Speech recognition ─────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const pttBtn    = document.getElementById('ptt-btn');
const pttStatus = document.getElementById('ptt-status');
const heardEl   = document.getElementById('heard');

if (!SR) {
  pttBtn.textContent = '❌';
  pttStatus.textContent = 'Chrome בלבד';
}

let recognition = null;
let pttActive = false;

function startListening() {
  if (!SR || pttActive) return;
  pttActive = true;
  pttBtn.classList.add('active');
  pttStatus.textContent = '🔴 מאזין...';

  // resume AudioContext on first gesture
  if (audioCtx.state === 'suspended') audioCtx.resume();
  playClick('on');

  recognition = new SR();
  recognition.lang = 'he-IL';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;

  recognition.onresult = (e) => {
    // Try all alternatives to find a matching command
    let matched = false;
    for (let alt = 0; alt < e.results[0].length && !matched; alt++) {
      const text = e.results[0][alt].transcript.trim();
      heardEl.textContent = `"${text}"`;
      for (const cmd of VOICE_COMMANDS) {
        if (cmd.words.some(w => text.includes(w))) {
          handleCommand(cmd);
          matched = true;
          break;
        }
      }
    }
  };

  recognition.onend = () => stopListening();
  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') heardEl.textContent = `שגיאה: ${e.error}`;
    stopListening();
  };

  recognition.start();
}

function stopListening() {
  if (!pttActive) return;
  pttActive = false;
  pttBtn.classList.remove('active');
  pttStatus.textContent = '—';
  playClick('off');
  if (recognition) { try { recognition.stop(); } catch(_) {} recognition = null; }
}

// Mouse / touch events for PTT
pttBtn.addEventListener('mousedown',  e => { e.preventDefault(); startListening(); });
pttBtn.addEventListener('touchstart', e => { e.preventDefault(); startListening(); }, { passive: false });
pttBtn.addEventListener('mouseup',    e => { e.preventDefault(); stopListening(); });
pttBtn.addEventListener('touchend',   e => { e.preventDefault(); stopListening(); }, { passive: false });
pttBtn.addEventListener('mouseleave', () => { if (pttActive) stopListening(); });
</script>
</body>
</html>
